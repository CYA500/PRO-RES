name: AuraMonitor_Build

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.3'
          channel: 'stable'

      - name: Android Production Fixes
        run: |
          # 1. إنشاء هيكل أندرويد باسم متوافق
          flutter create --project-name=pro_res . --platforms android
          
          # 2. تعديل minSdkVersion إلى 21
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
          
          # 3. تفعيل الاتصال المحلي (HTTP/WS)
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
          
          # 4. إضافة التصاريح اللازمة (الإنترنت والكاميرا)
          sed -i '/<\/manifest>/i <uses-permission android:name="android.permission.INTERNET" />\n<uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AuraMonitor-Release
          path: build/app/outputs/flutter-apk/app-release.apk
